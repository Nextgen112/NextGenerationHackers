function simpleObfuscate(code){
  const b64 = btoa(unescape(encodeURIComponent(code)));

  return `
(function(){
  function __ngh_run(){
    try{
      eval(decodeURIComponent(escape(atob("${b64}"))))
    }catch(e){}
  }

  if (document.readyState === "complete") {
    setTimeout(__ngh_run, 0);
  } else {
    window.addEventListener("load", __ngh_run, { once:true });
  }
})();
`;
}

function scanVars(t){
  const id='[A-Za-z_$][\\w$]*';

  return{
    RM:(t.match(new RegExp(`ResourceManager"\\]\\s*=\\s*(${id})`))||[])[1]||"pa",
    SM:(t.match(new RegExp(`SaveManager"\\]\\s*=\\s*(${id})`))||[])[1]||"Ja",
    PS:(t.match(new RegExp(`com\\.cc\\.popups\\.PopupSystem"\\]\\s*=\\s*(${id})`))||[])[1]||"U",
    PM:(t.match(new RegExp(`(${id})\\s*=\\s*function\\(\\)\\{this\\._isShowingGoldRepairSale=!1`))||[])[1]||"pm",
    FB:(t.match(/var\s+([A-Za-z_$][\w$]*)\s*=\s*function\s*\(\)\s*\{\s*this\._receivedPvPPayoutThisSession\s*=\s*!1\s*\}/)||[])[1],
    Q:(t.match(/var\s+([A-Za-z_$][\w$]*)\s*=\s*function\s*\(\)\s*\{\s*this\.h\s*=\s*Object\.create\(null\)\s*\}/)||[])[1],
    FLAGS:(t.match(/l\["com\.cc\.models\.Flags"\]\s*=\s*([A-Za-z_$][\w$]*)/)||[])[1],
    IC:(t.match(new RegExp(`(${id})\\.__name__\\s*=\\s*"URLLoaderApi"`))||[])[1],
    XS:(t.match(new RegExp(`(${id})\\.__name__\\s*=\\s*"MultipleAttemptURLLoader"`))||[])[1],
    GLOBAL:(t.match(new RegExp(`(${id})\\.__name__\\s*=\\s*"GLOBAL"`))||[])[1],
    BASE:(t.match(/([A-Za-z_$][\w$]*)\.__name__\s*=\s*"BASE"/)||[])[1],
    STORE:(t.match(/([A-Za-z_$][\w$]*)\.__name__\s*=\s*"STORE"/)||[])[1],
    STORE_ITEM:(t.match(/([A-Za-z_$][\w$]*)\.__name__\s*=\s*"StoreItem"/)||[])[1]
  };
}


const fill = (s, v) =>s.replace(/\{\{RM\}\}/g, v.RM).replace(/\{\{SM\}\}/g, v.SM).replace(/\{\{PS\}\}/g, v.PS).replace(/\{\{PM\}\}/g, v.PM).replace(/\{\{FB\}\}/g, v.FB).replace(/\{\{Q\}\}/g, v.Q).replace(/\{\{FLAGS\}\}/g, v.FLAGS).replace(/\{\{IC\}\}/g, v.IC).replace(/\{\{XS\}\}/g, v.XS).replace(/\{\{GLOBAL\}\}/g, v.GLOBAL).replace(/\{\{BASE\}\}/g, v.BASE).replace(/\{\{STORE\}\}/g, v.STORE).replace(/\{\{STORE_ITEM\}\}/g, v.STORE_ITEM);




function runHack(t, h, v) {
  let ok = true;

  for (let i = 0; i < h.steps.length; i++) {
    const s = h.steps[i];

    try {
      /* =========================================
         1) Resolve placeholders
         ========================================= */
      const findRaw = s.find ?? "";
      const replRaw = s.replace ?? "";

      const find = fill(findRaw, v);
      const repl = fill(replRaw, v);

      /* =========================================
         2) Guard unresolved placeholders
         ========================================= */
      const unresolved = find.match(/\{\{[^}]+\}\}/g);
      if (unresolved && unresolved.length) {
        console.warn(
          `[NGH][${h.id}][step ${i + 1}] unresolved placeholders`,
          unresolved
        );
        ok = false;
        continue;
      }

      /* =========================================
         3) Compile matcher
         ========================================= */
      let rx;
      if (s.regex) {
        rx = new RegExp(find, s.flags || "g");
      } else {
        const escaped = find.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        rx = new RegExp(escaped, "g");
      }

      if (!rx.test(t)) {
        console.warn(
          `[NGH][${h.id}][step ${i + 1}] no match found`
        );
        ok = false;
        continue;
      }

      /* =========================================
         4) Transforming replace (OBFUSCATE)
         ========================================= */
      let finalReplace = repl;

      if (s.transform === "obfuscate") {
        const anchor = find;

        // Extract payload (everything BEFORE anchor)
        if (!repl.endsWith(anchor)) {
          console.error(
            `[NGH][${h.id}] obfuscate requires anchor at end of replace`
          );
          ok = false;
          continue;
        }

        const payload = repl.slice(0, repl.length - anchor.length);

        // Preview / confirmation popup
        const proceed = confirm(
          `[NGH] Obfuscate injected payload?\n\n` +
          `Hack: ${h.nickname}\n` +
          `Payload size: ${payload.length} chars`
        );

        if (!proceed) {
          ok = false;
          continue;
        }

        const obfuscated = simpleObfuscate(payload);

        // Reattach anchor UNOBFUSCATED
        finalReplace = obfuscated + anchor;
      }

      /* =========================================
         5) Apply replace
         ========================================= */
      const before = t;
      t = t.replace(rx, finalReplace);

      if (t === before) {
        console.warn(
          `[NGH][${h.id}][step ${i + 1}] replace produced no change`
        );
        ok = false;
        continue;
      }

    } catch (e) {
      console.error(
        `[NGH][${h.id}][step ${i + 1}] exception`,
        e
      );
      ok = false;
    }
  }

  return { text: t, ok };
}

document.getElementById("runReplace").onclick=()=>{
 let t=originalCode.value,v=scanVars(t);
 logBody.innerHTML="";
 HARD_CODED_HACKS.forEach((h,i)=>{
  if(!h.enabled)return;
  const r=runHack(t,h,v);
  t=r.text;
  logBody.innerHTML+=`<tr><td>${i+1}</td><td>${h.nickname} — <span class="${r.ok?"ok":"fail"}">${r.ok?"Applied":"Failed"}</span></td></tr>`;
 });
 modifiedCode.value=t;
 log.style.display="block";
};

};
